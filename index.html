@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#060607;--s1:rgba(255,255,255,.03);--s2:rgba(255,255,255,.06);
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --t1:#f0f0f0;--t2:rgba(240,240,240,.5);--t3:rgba(240,240,240,.22);
  --wh:#fff;--inc:#4ecb55;--exp:#e04545;
  --gl:rgba(14,14,16,.8);--gb:rgba(255,255,255,.07);
  --r:18px;--r2:13px;--r3:9px;
  --f:'Inter',system-ui,sans-serif;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow-x:hidden;touch-action:manipulation}
body{
  background:var(--bg);color:var(--t1);font-family:var(--f);font-weight:600;
  -webkit-font-smoothing:antialiased;
  touch-action:pan-x pan-y;
  -ms-touch-action:pan-x pan-y;
  user-select:none;
  -webkit-user-select:none;
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.018;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E")}
input,textarea{user-select:text;-webkit-user-select:text}
.blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;animation:bf 14s ease-in-out infinite}
.b1{width:280px;height:280px;background:rgba(255,255,255,.04);top:-70px;right:-50px}
.b2{width:200px;height:200px;background:rgba(255,255,255,.025);bottom:120px;left:-40px;animation-delay:-7s}
@keyframes bf{0%,100%{transform:translateY(0)scale(1)}50%{transform:translateY(-16px)scale(1.03)}}

#app{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

/* HDR */
.hdr{padding:calc(10px + var(--st)) 16px 10px;display:flex;align-items:center;gap:10px;
position:sticky;top:0;z-index:100;
background:rgba(6,6,7,.78);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
border-bottom:1px solid var(--b1)}
.asb{display:flex;align-items:center;gap:6px;padding:7px 12px 7px 8px;background:var(--s2);border:1px solid var(--b2);border-radius:50px;cursor:pointer;font-size:13px;font-weight:700;color:var(--t2);transition:.2s;min-width:0;flex-shrink:0}
.asb:active{opacity:.7}
.asb-ico{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.asb-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.hdr-logo{flex:1;text-align:center;font-size:19px;font-weight:900;color:var(--wh);letter-spacing:-.02em;pointer-events:none;display:flex;align-items:center;justify-content:center;gap:7px}
.logo-paw{display:flex;align-items:center;opacity:.9}
.hdr-back{width:36px;height:36px;background:var(--s1);border:1px solid var(--b1);border-radius:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s;flex-shrink:0}
.hdr-back:active{opacity:.6;transform:scale(.9)}
/* Top-right buttons - pill/rounded */
.hib{width:36px;height:36px;background:var(--s1);border:1px solid var(--b1);border-radius:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s;flex-shrink:0;padding:0}
.hib:active{opacity:.6;transform:scale(.92)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:16px 14px calc(88px + var(--sb));display:flex;flex-direction:column;gap:0}
.main::-webkit-scrollbar{width:0}
.page-content{display:flex;flex-direction:column;gap:13px}

/* FAB */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 14px calc(14px + var(--sb));display:flex;align-items:center;justify-content:center;z-index:200;pointer-events:none}
.fab{width:64px;height:64px;background:var(--wh);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s cubic-bezier(.16,1,.3,1);pointer-events:all;box-shadow:0 6px 24px rgba(255,255,255,.22),0 2px 10px rgba(0,0,0,.5)}
.fab:active{transform:scale(.86)}

/* GLASS */
.gc{background:var(--gl);backdrop-filter:blur(28px) saturate(1.8);-webkit-backdrop-filter:blur(28px) saturate(1.8);border:1px solid var(--gb);border-radius:22px;box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.07)}
.card{background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.05)}

/* BALANCE */
.bal-card{padding:24px 20px 20px;position:relative;overflow:hidden}
.bal-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,255,255,.04) 0%,transparent 70%);pointer-events:none}
.bal-lbl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;text-align:center}
.bal-amt-row{display:flex;align-items:baseline;gap:5px;justify-content:center;margin-bottom:0}
.bal-amt{font-size:40px;font-weight:900;color:var(--wh);line-height:1;letter-spacing:-.03em}
.bal-cur{font-size:17px;font-weight:700;color:var(--t2)}
.bal-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.bs{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:var(--r2);padding:11px 13px}
.bs-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.bs-val{font-size:15px;font-weight:800;color:var(--t1)}
.bdot{width:5px;height:5px;border-radius:50%}.bdot-i{background:var(--inc)}.bdot-e{background:var(--exp)}

/* SEC */
.sec{display:flex;align-items:center;justify-content:space-between;padding:0 2px;margin-bottom:9px}
.sec-t{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--t2)}

/* TX */
.txl{display:flex;flex-direction:column;gap:6px}
.tx-day{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:9px 3px 4px}
.tx-row{position:relative;border-radius:var(--r2);overflow:hidden;flex-shrink:0;touch-action:pan-y}
.tx-del-bg{position:absolute;right:0;top:0;bottom:0;width:70px;display:flex;align-items:center;justify-content:center;border-radius:0 var(--r2) var(--r2) 0;background:#b91c1c;opacity:0}
.tx-del-snap{position:absolute;right:0;top:0;bottom:0;width:56px;display:flex;align-items:center;justify-content:center;background:#dc2626;border-radius:0 var(--r2) var(--r2) 0;opacity:0;cursor:pointer}
.txi{display:flex;align-items:center;gap:11px;padding:13px 14px;background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r2);cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.04);position:relative;overflow:hidden;will-change:transform;transition:transform .3s cubic-bezier(.16,1,.3,1)}
.txi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0}
.txi.itx::before{background:var(--inc)}.txi.etx::before{background:var(--exp)}.txi.ttx::before{background:#6ab0f5}
.txi-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-width:1.5px;border-style:solid}
.txi-inf{flex:1;min-width:0}
.txi-name{font-size:14px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txi-sub{font-size:11px;font-weight:500;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txi-r{text-align:right;flex-shrink:0}
.txi-amt{font-size:15px;font-weight:800}
.txi-time{font-size:10px;font-weight:500;color:var(--t3);margin-top:2px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;color:var(--t3);text-align:center;gap:7px}
.empty-t{font-size:14px;font-weight:700;color:var(--t2)}.empty-s{font-size:12px;font-weight:500}

/* STATS */
.stat-type-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.stt-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:50px;border:1px solid var(--b2);background:var(--s1);cursor:pointer;font-size:12px;font-weight:700;color:var(--t3);transition:.2s;font-family:var(--f)}
.stt-btn.active-i{background:rgba(78,203,85,.14);border-color:rgba(78,203,85,.35);color:var(--inc)}
.stt-btn.active-e{background:rgba(224,69,69,.14);border-color:rgba(224,69,69,.35);color:var(--exp)}
.per-btn{padding:7px 13px;border-radius:50px;border:1px solid var(--b1);background:var(--s1);cursor:pointer;font-size:12px;font-weight:700;color:var(--t3);transition:.2s;font-family:var(--f)}
.per-btn.active{background:rgba(255,255,255,.09);border-color:var(--b2);color:var(--wh)}
.stat-view-btn{width:32px;height:32px;background:var(--s1);border:1px solid var(--b1);border-radius:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s;margin-left:auto}
.stat-view-btn.active{background:rgba(255,255,255,.09);border-color:var(--b2)}
.donut-card{background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);padding:20px 14px 16px;display:flex;flex-direction:column;align-items:center}
.chart-card{background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);padding:18px 16px 16px}
.stat-cat-list{display:flex;flex-direction:column;gap:7px}
.scr{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r2);box-shadow:0 2px 10px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.03)}
.scr-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-width:1.5px;border-style:solid}
.scr-bar-wrap{flex:1;min-width:0}
.scr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.scr-name{font-size:13px;font-weight:700}
.scr-amt{font-size:14px;font-weight:800;color:var(--wh)}
.scr-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.scr-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.16,1,.3,1)}

/* ACCOUNTS */
.afc{background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r);padding:16px;box-shadow:0 4px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06)}
.aft{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.af-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-width:1.5px;border-style:solid}
.af-inf{flex:1}.af-name{font-size:15px;font-weight:800;color:var(--wh)}
.af-type{font-size:11px;font-weight:500;color:var(--t3);margin-top:2px}
.af-bal{font-size:24px;font-weight:900;color:var(--wh);margin-bottom:4px;letter-spacing:-.02em}

.ast{flex:1;text-align:center}
.ast-v{font-size:13px;font-weight:800;color:var(--t1)}
.ast-l{font-size:9px;font-weight:700;color:var(--t3);margin-top:3px;letter-spacing:.07em;text-transform:uppercase}

/* CATS */
.cgrp{background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05)}
.chdr{display:flex;align-items:center;gap:11px;padding:14px 15px;cursor:pointer;transition:.2s}
.chdr:active{opacity:.7}
.c-ico{width:33px;height:33px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-width:1.5px;border-style:solid}
.c-inf{flex:1}.c-name{font-size:14px;font-weight:800;color:var(--t1)}

.sub-item:hover .sub-del{opacity:1}
.add-sub-btn{display:flex;align-items:center;gap:6px;padding:7px;border-radius:var(--r3);cursor:pointer;border:none;background:none;width:100%;color:var(--t3);font-family:var(--f);font-size:12px;font-weight:700;transition:.2s}

.add-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:rgba(255,255,255,.02);border:1px dashed var(--b2);border-radius:var(--r);cursor:pointer;transition:.2s;font-size:13px;font-weight:700;color:var(--t3);font-family:var(--f)}

.ctab.active-e{background:rgba(224,69,69,.12);border-color:rgba(224,69,69,.3);color:var(--exp)}
.ctab.active-i{background:rgba(78,203,85,.12);border-color:rgba(78,203,85,.3);color:var(--inc)}

/* SETTINGS */
.set-list{display:flex;flex-direction:column;gap:7px}
.set-sec{font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);padding:10px 3px 4px}
.set-item{display:flex;align-items:center;gap:11px;padding:13px 14px;background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r2);cursor:pointer;transition:.2s;box-shadow:0 2px 10px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.04)}

.set-inf{flex:1}.set-t{font-size:14px;font-weight:700;color:var(--t1)}.set-s{font-size:11px;font-weight:500;color:var(--t3);margin-top:2px}
.set-r{color:var(--t3);font-size:14px}

.mhdl{display:none}

.ttype{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:12px;padding:3px;margin-bottom:16px;gap:3px}
.ttb{flex:1;padding:8px;border:none;background:none;color:var(--t3);font-family:var(--f);font-size:13px;font-weight:700;border-radius:9px;cursor:pointer;transition:all .2s}
.ttb.ai{background:rgba(78,203,85,.12);color:var(--inc);box-shadow:inset 0 1px 0 rgba(78,203,85,.16)}
.ttb.ae{background:rgba(224,69,69,.12);color:var(--exp);box-shadow:inset 0 1px 0 rgba(224,69,69,.16)}
.ttb.at{background:rgba(106,176,245,.12);color:#6ab0f5;box-shadow:inset 0 1px 0 rgba(106,176,245,.16)}
.amtd{text-align:center;padding:10px 0 16px}
.amtr{display:flex;align-items:baseline;justify-content:center;gap:5px}
.amt-cur{font-size:19px;font-weight:700;color:var(--t3)}
.amt-v{font-size:46px;font-weight:900;color:var(--wh);letter-spacing:-.02em;display:inline-block;min-width:40px}
.fgrp{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.field{background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:center;gap:8px;transition:border-color .2s}
.field:focus-within{border-color:rgba(255,255,255,.22)}
.fic{opacity:.4;display:flex;align-items:center;flex-shrink:0}
.field input,.field select{flex:1;background:none;border:none;outline:none;color:var(--t1);font-family:var(--f);font-size:14px;font-weight:600}
.field input::placeholder{color:var(--t3)}.field select option{background:#1a1a1e;color:#fff}
.asel-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.asel-row::-webkit-scrollbar{display:none}
.asel-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:50px;cursor:pointer;font-size:12px;font-weight:700;color:var(--t3);transition:.2s;white-space:nowrap}
.asel-chip.sel{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.22);color:var(--wh)}
.csl{display:flex;flex-direction:column;gap:4px;max-height:190px;overflow-y:auto;margin-bottom:12px;scrollbar-width:none}
.csl::-webkit-scrollbar{display:none}
.csl-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:var(--r2);cursor:pointer;transition:.15s;font-size:13px;font-weight:700;color:var(--t2)}
.csl-item.sel{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:var(--wh)}
.csl-sub{padding-left:30px;font-size:12px;font-weight:600;color:var(--t3);border-color:rgba(255,255,255,.04)}
.csl-sub.sel{color:var(--t1);background:rgba(255,255,255,.06)}
.npad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}

.an2{animation:sdwn .4s .07s cubic-bezier(.16,1,.3,1) both}
